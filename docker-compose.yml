version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: doccollector_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: doccollector
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doccollector_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: